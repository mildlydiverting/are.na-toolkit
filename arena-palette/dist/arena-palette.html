<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Are.na Palette</title>
<!--
  arena-palette v1.9
  ──────────────────────────────────────────────────────────────────
  Are.na colour palette extractor tool
  Fetches images from up to 4 Are.na channels, extracts a 7-colour
  k-means palette from a selected image, generates tints/shades, and
  exports in multiple formats.

  Changelog:
    v1.0 (2026-04-07) — Initial release. Are.na v2 API, fixed pool of
                         40 images per channel. Hand-rolled k-means extraction.
    v1.1 (2026-04-07) — Migrated to Are.na v3 API.
    v1.2 (2026-04-07) — Fixed v3 image URL fields (image.src / image.small.src).
                         Single channel now fills all 9 grid slots; multiple channels
                         distribute slots evenly (e.g. 2 channels = 5+4, 3 = 3+3+3).
                         Two-step random-page fetch: channel meta for total count,
                         then per=1 at random page offsets with retry loop.
    v1.3 (2026-04-07) — Replaced k-means with Color Thief v2 (MMCQ). Added
                         manual pixel-count second pass for proportions. Proportion
                         bar displayed above each swatch row.
    v1.4 (2026-04-07) — Upgraded to Color Thief v3 (unpkg). v3 Color objects expose
                         .population directly, removing the manual pixel-count loop.
    v1.5 (2026-04-07) — Fixed Color object access to use c.array() (public API).
                         Added extraction settings panel: colorCount, quality,
                         colorSpace, ignoreWhite, minSaturation. All persisted to
                         localStorage. Cached loaded HTMLImageElement so settings
                         changes re-run extraction locally with no Are.na API hit.
    v1.6 (2026-04-07) — Added semantic palette section below tint/shade rows.
                         getSwatchesSync extracts Vibrant, DarkVibrant, LightVibrant,
                         Muted, DarkMuted, LightMuted. Displayed as a proportional
                         colour bar (widths from nearest palette colour proportion)
                         with a hex legend below. Click any legend item to copy hex.
    v1.7 (2026-04-07) - Add full-width proportion bar, 1% floor to show colours. Share
                         applyFloor helper
    v1.8 (2026-04-12) — Typography: Karla (sans) + Courier Prime (mono). Increased
                         base font size to 16px. Darkened --text and --muted for legibility.
    v1.9 (2026-04-12) — Full CSS unit pass: 62.5% root font-size trick, all font
                         sizes and spacing converted to rem throughout.
                         
  API: Are.na REST API v3 — https://www.are.na/developers/explore
  Base URL: https://api.are.na
  Endpoints used:
    GET /v3/channels/{slug}           — channel metadata (total count)
    GET /v3/channels/{slug}/contents  — paginated blocks (per=1 for random page)

  Dependencies:
    Color Thief 3.x (unpkg) — MMCQ palette extraction, v3 API
    JSZip 3.10.1 (cdnjs) — used in export functions
    DM Mono + DM Sans (Google Fonts)
  ──────────────────────────────────────────────────────────────────
-->
<script src="https://unpkg.com/colorthief@3/dist/umd/color-thief.global.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  /* ── v1.9 ── */
  /* Base font trick: 1rem = 10px (62.5% of browser default 16px).
     All font-size and spacing values use rem throughout. */
  :root {
    font-size: 62.5%;
    --bg: #808080;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e0dbd3;
    --text: #0f0d0b;
    --muted: #5a5550;
    --accent: #2d2926;
    --tag-bg: #e8e4de;
    --radius: 0.6rem;
    --font: 'Karla', monospace;
    --font-sans: 'Karla', system-ui, sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Karla:wght@300;400;500;700&family=Courier+Prime:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 1.6rem;
    min-height: 100vh;
  }

  header {
    padding: 1.5rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }
  header h1 {
    font-family: var(--font);
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  header span {
    font-size: 1.2rem;
    color: var(--muted);
    font-family: var(--font);
  }

  .layout {
    display: grid;
    grid-template-columns: 26rem 1fr;
    min-height: calc(100vh - 5.6rem);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .sidebar h2 {
    font-family: var(--font);
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .channel-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .channel-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .channel-row input[type="text"] {
    flex: 1;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 1.2rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .channel-row input[type="text"]:focus {
    border-color: var(--accent);
  }
  .channel-row input[type="text"]::placeholder {
    color: var(--muted);
  }

  .btn-icon {
    width: 2.6rem; height: 2.6rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-icon:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  .btn-add {
    font-family: var(--font);
    font-size: 1.1rem;
    color: var(--muted);
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 0.6rem 1rem;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: all 0.15s;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--text); }

  .token-row {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .token-row label {
    font-family: var(--font);
    font-size: 1.1rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .token-row input {
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 1.2rem;
    outline: none;
    width: 100%;
  }
  .token-row input:focus { border-color: var(--accent); }

  .btn-fetch {
    background: var(--accent);
    color: #f5f3ef;
    border: none;
    border-radius: var(--radius);
    padding: 0.9rem 1.4rem;
    font-family: var(--font);
    font-size: 1.2rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.15s;
    width: 100%;
  }
  .btn-fetch:hover { opacity: 0.85; }
  .btn-fetch:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-msg {
    font-family: var(--font);
    font-size: 1.1rem;
    color: var(--muted);
    min-height: 1.6rem;
  }
  .status-msg.error { color: #c0392b; }

  /* ── MAIN ── */
  .main {
    display: flex;
    flex-direction: column;
  }

  .grid-section {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .grid-section h2 {
    font-family: var(--font);
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(12rem, 1fr));
    gap: 0.8rem;
  }

  .thumb {
    aspect-ratio: 1;
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.1s;
    background: var(--surface2);
    position: relative;
  }
  .thumb:hover { border-color: var(--accent); transform: scale(1.02); }
  .thumb.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb .channel-tag {
    position: absolute;
    bottom: 0.4rem; left: 0.4rem;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-family: var(--font);
    font-size: 0.9rem;
    padding: 0.2rem 0.5rem;
    border-radius: 0.3rem;
    pointer-events: none;
  }

  .placeholder-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(12rem, 1fr));
    gap: 0.8rem;
  }
  .placeholder-cell {
    aspect-ratio: 1;
    border-radius: var(--radius);
    background: var(--surface2);
    border: 1px dashed var(--border);
  }

  /* ── ANALYSIS SECTION ── */
  .analysis-section {
    padding: 1.5rem;
    flex: 1;
  }

  .analysis-section h2 {
    font-family: var(--font);
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .analysis-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  .selected-image-wrap {
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface2);
    aspect-ratio: 4/3;
  }
  .selected-image-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }

  .palette-panel {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .colour-rows {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .colour-block {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .colour-label {
    font-family: var(--font);
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 0.2rem;
  }

  /* ── SEMANTIC BAR ── */
  .semantic-section {
    margin-top: 1rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .semantic-label {
    font-family: var(--font);
    font-size: 1rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }
  .semantic-bar {
    display: flex;
    height: 3.2rem;
    border-radius: var(--radius);
    overflow: hidden;
    gap: 2px;
  }
  .semantic-segment {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 2px;
    cursor: default;
    transition: flex 0.3s ease;
  }
  .semantic-segment-label {
    font-family: var(--font);
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    padding: 0 0.4rem;
    pointer-events: none;
  }
  .semantic-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem 1.2rem;
    margin-top: 0.6rem;
  }
  .semantic-legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: var(--font);
    font-size: 1rem;
    color: var(--muted);
    cursor: pointer;
  }
  .semantic-legend-dot {
    width: 1rem;
    height: 1rem;
    border-radius: 0.2rem;
    flex-shrink: 0;
  }

  .swatch-row {
    display: flex;
    gap: 2px;
  }

  .swatch {
    height: 2.8rem;
    flex: 1;
    border-radius: 0.3rem;
    cursor: pointer;
    transition: transform 0.1s;
    position: relative;
  }
  .swatch:hover { transform: scaleY(1.15); z-index: 1; }
  .swatch.base { height: 3.6rem; border-radius: 0.4rem; flex: 1.4; }

  .swatch-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 0.4rem);
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #f5f3ef;
    font-family: var(--font);
    font-size: 1rem;
    padding: 0.3rem 0.6rem;
    border-radius: 0.3rem;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
  }
  .swatch:hover .swatch-tooltip { display: block; }

  /* ── EXPORT ── */
  .export-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
    margin-top: 0.5rem;
  }

  .btn-export {
    font-family: var(--font);
    font-size: 1.1rem;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-export:hover { background: var(--accent); color: #f5f3ef; border-color: var(--accent); }
  .btn-export:disabled { opacity: 0.35; cursor: not-allowed; }

  .empty-analysis {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 20rem;
    color: var(--muted);
    font-family: var(--font);
    font-size: 1.2rem;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  .analyse-spinner {
    display: inline-block;
    width: 1.2rem; height: 1.2rem;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 0.6rem;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EXTRACTION SETTINGS ── */
  .settings-panel {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .settings-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 1rem;
    background: var(--surface2);
    border: none;
    cursor: pointer;
    font-family: var(--font);
    font-size: 1.1rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .settings-toggle:hover { color: var(--text); }
  .settings-toggle .caret { transition: transform 0.2s; font-style: normal; }
  .settings-toggle.open .caret { transform: rotate(180deg); }
  .settings-body {
    display: none;
    padding: 1rem;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem 1.6rem;
  }
  .settings-body.hidden { display: none; }
  .setting-row {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .setting-row label {
    font-family: var(--font);
    font-size: 1rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .setting-row select,
  .setting-row input[type=range] {
    font-family: var(--font);
    font-size: 1.1rem;
    width: 100%;
  }
  .setting-row select {
    padding: 0.3rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
  }
  .setting-toggle-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .setting-toggle-row label {
    font-family: var(--font);
    font-size: 1rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    cursor: pointer;
  }
  .setting-val {
    font-family: var(--font);
    font-size: 1rem;
    color: var(--muted);
    text-align: right;
  }
</style>
</head>
<body>

<header>
  <h1>are.na palette</h1>
  <span>v1.9</span>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <h2>Channels</h2>
      <div style="height:10px"></div>
      <div class="channel-list" id="channelList"></div>
      <div style="height:8px"></div>
      <button class="btn-add" id="btnAddChannel">+ add channel</button>
    </div>

    <div class="token-row">
      <label>Access token (optional)</label>
      <input type="password" id="tokenInput" placeholder="leave blank for public channels" />
    </div>

    <div>
      <button class="btn-fetch" id="btnFetch">fetch images</button>
      <div style="height:8px"></div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="grid-section">
      <h2>Images</h2>
      <div class="placeholder-grid" id="imageGrid">
        <div class="placeholder-cell"></div>
        <div class="placeholder-cell"></div>
        <div class="placeholder-cell"></div>
        <div class="placeholder-cell"></div>
        <div class="placeholder-cell"></div>
        <div class="placeholder-cell"></div>
        <div class="placeholder-cell"></div>
        <div class="placeholder-cell"></div>
        <div class="placeholder-cell"></div>
      </div>
    </div>

    <div class="analysis-section">
      <h2>Palette analysis</h2>
      <div id="analysisArea">
        <div class="empty-analysis">← select an image to extract its palette</div>
      </div>
    </div>
  </main>
</div>

<!-- Hidden canvas for colour extraction -->
<canvas id="scratchCanvas" style="display:none"></canvas>

<script>
// ── CONFIG & STORAGE ──────────────────────────────────────────────────────────
const STORAGE_KEY = 'arena-palette-v1';
const DEFAULT_CHANNELS = ['', '', ''];
const MAX_CHANNELS = 4;
const IMAGES_PER_CHANNEL = 3;
// NUM_COLORS is now dynamic — see extractionSettings
const TINT_STEPS = 3;
const SHADE_STEPS = 3;

// Are.na API v3 — https://www.are.na/developers/explore
const API_BASE = 'https://api.are.na/v3';
const MAX_RETRIES = 12; // max attempts per image slot to land on an Image block

// ── EXTRACTION SETTINGS ──────────────────────────────────────────────────────
const SETTINGS_KEY = 'arena-palette-settings-v1';
const DEFAULT_SETTINGS = {
  colorCount:    7,
  quality:      'med',   // 'hi' | 'med' | 'lo'
  colorSpace:   'oklch', // 'oklch' | 'rgb'
  ignoreWhite:   true,
  minSaturation: 0,
};

function qualityValue(q) {
  return q === 'hi' ? 1 : q === 'lo' ? 30 : 10;
}

let extractionSettings = { ...DEFAULT_SETTINGS };

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (raw) extractionSettings = { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
  } catch(e) {}
}

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(extractionSettings));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function saveState(channels, token) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ channels, token }));
  } catch(e) {}
}

// ── DOM REFS ──────────────────────────────────────────────────────────────────
const channelListEl = document.getElementById('channelList');
const btnAddChannel = document.getElementById('btnAddChannel');
const tokenInput    = document.getElementById('tokenInput');
const btnFetch      = document.getElementById('btnFetch');
const statusMsg     = document.getElementById('statusMsg');
const imageGrid     = document.getElementById('imageGrid');
const analysisArea  = document.getElementById('analysisArea');
const scratch       = document.getElementById('scratchCanvas');
const ctx           = scratch.getContext('2d', { willReadFrequently: true });

// ── CHANNEL MANAGEMENT ────────────────────────────────────────────────────────
let channels = [];

function renderChannels() {
  channelListEl.innerHTML = '';
  channels.forEach((slug, i) => {
    const row = document.createElement('div');
    row.className = 'channel-row';
    row.innerHTML = `
      <input type="text" placeholder="channel-slug" value="${slug}" data-idx="${i}" />
      <button class="btn-icon" data-remove="${i}" title="remove">×</button>
    `;
    channelListEl.appendChild(row);
  });

  channelListEl.querySelectorAll('input[type="text"]').forEach(inp => {
    inp.addEventListener('input', e => {
      channels[+e.target.dataset.idx] = e.target.value.trim();
      persistState();
    });
  });

  channelListEl.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = +e.target.dataset.remove;
      channels.splice(idx, 1);
      renderChannels();
      persistState();
    });
  });

  btnAddChannel.style.display = channels.length >= MAX_CHANNELS ? 'none' : '';
}

btnAddChannel.addEventListener('click', () => {
  if (channels.length < MAX_CHANNELS) {
    channels.push('');
    renderChannels();
  }
});

function persistState() {
  saveState(channels, tokenInput.value);
}

tokenInput.addEventListener('input', persistState);

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init() {
  loadSettings();
  const saved = loadState();
  channels = saved?.channels?.length ? saved.channels : [...DEFAULT_CHANNELS];
  if (saved?.token) tokenInput.value = saved.token;
  renderChannels();
})();

// ── ARE.NA API v3 ─────────────────────────────────────────────────────────────
// Step 1: fetch channel metadata to get total block count
async function fetchChannelMeta(slug, headers) {
  const res = await fetch(`${API_BASE}/channels/${encodeURIComponent(slug)}`, { headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.details?.message || `Channel "${slug}" not found (${res.status})`);
  }
  return res.json();
  // Returns channel object with counts.contents = total block count
}

// Step 2: fetch a single block at a random page offset (per=1 means page = position)
async function fetchBlockAtPage(slug, page, headers) {
  const res = await fetch(
    `${API_BASE}/channels/${encodeURIComponent(slug)}/contents?per=1&page=${page}`,
    { headers }
  );
  if (!res.ok) throw new Error(`Fetch failed for "${slug}" page ${page} (${res.status})`);
  const data = await res.json();
  return data.data?.[0] || null; // v3 wraps blocks in data[]
}

// Fetch slotsNeeded random image blocks from a channel.
// Retries up to MAX_RETRIES times per slot to land on an Image block.
// v3 image URL fields: image.src (original), image.small.src (thumbnail)
async function fetchChannelImages(slug, token, slotsNeeded) {
  const headers = {};
  if (token) headers['Authorization'] = `Bearer ${token}`;

  const meta = await fetchChannelMeta(slug, headers);
  const total = meta.counts?.contents ?? 0;
  if (!total) throw new Error(`Channel "${slug}" appears to be empty`);

  const results = [];
  const usedPages = new Set();

  for (let slot = 0; slot < slotsNeeded; slot++) {
    for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
      let page, tries = 0;
      do {
        page = Math.floor(Math.random() * total) + 1;
        tries++;
      } while (usedPages.has(page) && tries < 20);
      usedPages.add(page);

      const block = await fetchBlockAtPage(slug, page, headers);
      if (block && block.type === 'Image' && block.image) {
        // v3 field names: image.src = original, image.small.src = thumbnail
        results.push({
          url:      block.image.small?.src || block.image.src,
          original: block.image.src,
          title:    block.title || '',
          channel:  slug,
          id:       block.id
        });
        break;
      }
    }
    // If retries exhausted for this slot, skip silently — partial results are fine
  }

  if (!results.length) throw new Error(`No image blocks found in "${slug}" after ${MAX_RETRIES} attempts`);
  return results;
}

// ── FETCH BUTTON ──────────────────────────────────────────────────────────────
btnFetch.addEventListener('click', async () => {
  const slugs = channels.filter(s => s.trim());
  if (!slugs.length) {
    setStatus('add at least one channel slug', true);
    return;
  }

  btnFetch.disabled = true;
  setStatus('<span class="analyse-spinner"></span>fetching…');
  persistState();

  const token = tokenInput.value.trim();
  let allImages = [];
  const errors = [];

  // Distribute the 9 grid slots evenly across however many channels are entered.
  // With 1 channel: all 9 slots. With 2: 5+4. With 3: 3+3+3. With 4: 3+2+2+2.
  const totalSlots = IMAGES_PER_CHANNEL * MAX_CHANNELS; // always 9 (3*3) ... wait, use fixed 9
  const GRID_SIZE = 9;
  const baseSlots = Math.floor(GRID_SIZE / slugs.length);
  const extraSlots = GRID_SIZE % slugs.length;

  for (let i = 0; i < slugs.length; i++) {
    const slotsNeeded = baseSlots + (i < extraSlots ? 1 : 0);
    try {
      const imgs = await fetchChannelImages(slugs[i], token, slotsNeeded);
      allImages = allImages.concat(imgs);
    } catch(e) {
      errors.push(e.message);
    }
  }

  btnFetch.disabled = false;

  if (!allImages.length) {
    setStatus(errors[0] || 'no images found', true);
    return;
  }

  const errNote = errors.length ? ` (${errors.length} channel error${errors.length > 1 ? 's' : ''})` : '';
  setStatus(`${allImages.length} images loaded${errNote}`);
  renderImageGrid(allImages);
});

// ── IMAGE GRID ────────────────────────────────────────────────────────────────
let loadedImages = [];

function renderImageGrid(images) {
  loadedImages = images;
  imageGrid.className = 'image-grid';
  imageGrid.innerHTML = '';

  images.forEach((img, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    thumb.dataset.idx = i;
    thumb.innerHTML = `
      <img src="${img.url}" crossorigin="anonymous" loading="lazy" alt="${img.title}" />
      <span class="channel-tag">${img.channel}</span>
    `;
    thumb.addEventListener('click', () => selectImage(i));
    imageGrid.appendChild(thumb);
  });
}

// ── IMAGE SELECTION ───────────────────────────────────────────────────────────
let currentPalette  = null;
let currentImageObj = null;
let currentImageEl  = null; // cached HTMLImageElement — reused on settings change

function selectImage(idx) {
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected'));
  const thumb = document.querySelector(`.thumb[data-idx="${idx}"]`);
  if (thumb) thumb.classList.add('selected');

  currentImageObj = loadedImages[idx];
  analysisArea.innerHTML = `<div class="empty-analysis"><span class="analyse-spinner"></span>extracting palette…</div>`;

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    currentImageEl = img; // cache for re-extraction without re-fetching
    runExtraction();
  };
  img.onerror = () => {
    analysisArea.innerHTML = `<div class="empty-analysis">could not load image for analysis (CORS)</div>`;
  };
  img.src = currentImageObj.original + '?t=' + Date.now();
}

// Run extraction on the cached image — called on first load and on settings change
function runExtraction() {
  if (!currentImageEl) return;
  const paletteData = extractPalette(currentImageEl);
  const swatches    = extractSwatches(currentImageEl);
  currentPalette = paletteData;
  renderAnalysis(currentImageEl, paletteData, swatches);
}

// ── COLOUR EXTRACTION (Color Thief v3 — MMCQ) ───────────────────────────────
// c.array() is the correct public API for [r,g,b] in v3 UMD build.
function extractPalette(imgEl) {
  const s = extractionSettings;
  const colors = ColorThief.getPaletteSync(imgEl, {
    colorCount:    s.colorCount,
    quality:       qualityValue(s.quality),
    colorSpace:    s.colorSpace,
    ignoreWhite:   s.ignoreWhite,
    minSaturation: s.minSaturation,
  });
  if (!colors) return [];
  const totalPop = colors.reduce((sum, c) => sum + c.population, 0) || 1;
  return colors.map(c => ({
    rgb:        c.array(),
    proportion: c.population / totalPop
  }));
}

// ── SWATCH EXTRACTION ─────────────────────────────────────────────────────────
// getSwatchesSync uses colorCount:16 internally for best classification.
// Returns a SwatchMap: { Vibrant, Muted, DarkVibrant, DarkMuted, LightVibrant, LightMuted }
// Each present swatch has .color (Color object) and .role (string).
// We match each swatch to the nearest palette colour to borrow its proportion.
const SWATCH_ROLES = ['Vibrant', 'DarkVibrant', 'LightVibrant', 'Muted', 'DarkMuted', 'LightMuted'];

function extractSwatches(imgEl) {
  try {
    return ColorThief.getSwatchesSync(imgEl) || {};
  } catch(e) {
    return {};
  }
}

function swatchProportions(swatchMap, paletteData) {
  // For each present swatch, find nearest palette colour and use its proportion.
  // Multiple swatches may map to the same palette colour — that's fine.
  const result = [];
  SWATCH_ROLES.forEach(role => {
    const sw = swatchMap[role];
    if (!sw) return;
    const rgb = sw.color.array();
    // Find nearest palette colour by squared RGB distance
    let best = 0, bestDist = Infinity;
    paletteData.forEach(({ rgb: pr }, i) => {
      const d = (rgb[0]-pr[0])**2 + (rgb[1]-pr[1])**2 + (rgb[2]-pr[2])**2;
      if (d < bestDist) { bestDist = d; best = i; }
    });
    result.push({
      role,
      hex:        rgbToHex(rgb),
      tc:         sw.color.textColor,
      proportion: paletteData[best].proportion,
    });
  });
  return applyFloor(result, 0.05); // 5% floor for semantic bar
}
// ── FLOOR HELPER ─────────────────────────────────────────────────────────────
// Ensures no segment falls below minProp, deducting deficit from larger segments.
function applyFloor(items, minProp) {
  const raw = items.reduce((s, r) => s + r.proportion, 0) || 1;
  items.forEach(r => r.proportion = r.proportion / raw);
  let deficit = 0;
  items.forEach(r => { if (r.proportion < minProp) deficit += minProp - r.proportion; });
  if (deficit > 0) {
    const donors = items.filter(r => r.proportion > minProp);
    const donorTotal = donors.reduce((s, r) => s + r.proportion, 0);
    donors.forEach(r => { r.proportion -= deficit * (r.proportion / donorTotal); });
    items.forEach(r => { if (r.proportion < minProp) r.proportion = minProp; });
  }
  return items;
}

function rgbToHex([r,g,b]) {
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function rgbToHsl([r,g,b]) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h/30) % 12;
  const a = s * Math.min(l, 1-l);
  const f = n => l - a * Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n), 1)));
  return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
}

function makeTintsShades(rgb) {
  const [h, s, l] = rgbToHsl(rgb);
  const tints = [], shades = [];
  for (let i = TINT_STEPS; i >= 1; i--) {
    const newL = Math.min(95, l + (i * (95 - l) / (TINT_STEPS + 1)));
    tints.push(hslToRgb(h, s, newL));
  }
  for (let i = 1; i <= SHADE_STEPS; i++) {
    const newL = Math.max(5, l - (i * l / (SHADE_STEPS + 1)));
    shades.push(hslToRgb(h, s, newL));
  }
  return { tints, shades };
}

function textColour(rgb) {
  const [r,g,b] = rgb;
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.5 ? '#1a1814' : '#f5f3ef';
}

// ── RENDER ANALYSIS ───────────────────────────────────────────────────────────
// paletteData = [{rgb: [r,g,b], proportion: 0-1}, ...]
// swatchMap   = ColorThief SwatchMap { Vibrant, Muted, ... }
function renderAnalysis(imgEl, paletteData, swatchMap) {
  const palette = paletteData.map(d => d.rgb);

  // Build semantic bar data
  const swatchData = swatchProportions(swatchMap, paletteData);
  const semanticBarHtml = swatchData.length ? (() => {
    const segments = swatchData.map(({ role, hex, tc, proportion }) => {
      const pct = Math.round(proportion * 100);
      return `<div class="semantic-segment"
        style="flex:${proportion};background:${hex}"
        title="${role} · ${hex} · ${pct}%">
        <span class="semantic-segment-label" style="color:${tc}">${pct > 8 ? role : ''}</span>
      </div>`;
    }).join('');
    const legend = swatchData.map(({ role, hex, tc }) =>
      `<div class="semantic-legend-item" onclick="navigator.clipboard.writeText('${hex}').catch(()=>{})">
        <div class="semantic-legend-dot" style="background:${hex}"></div>
        <span>${role} · ${hex}</span>
      </div>`
    ).join('');
    return `<div class="semantic-section">
      <div class="semantic-label">semantic palette</div>
      <div class="semantic-bar">${segments}</div>
      <div class="semantic-legend">${legend}</div>
    </div>`;
  })() : '';

  // Main proportion bar — 1% floor, segments sized by pixel proportion
  const propBarItems = applyFloor(
    paletteData.map(({ rgb, proportion }) => ({ hex: rgbToHex(rgb), tc: textColour(rgb), proportion })),
    0.01
  );
  const mainPropBar = `<div class="semantic-section" style="margin-top:0;padding-top:0;border-top:none;margin-bottom:0.75rem">
    <div class="semantic-label">colour proportions</div>
    <div class="semantic-bar">${
      propBarItems.map(({ hex, tc, proportion }) => {
        const pct = Math.round(proportion * 100);
        return `<div class="semantic-segment"
          style="flex:${proportion};background:${hex}"
          title="${hex} · ${pct}%">
          <span class="semantic-segment-label" style="color:${tc}">${pct > 6 ? pct + '%' : ''}</span>
        </div>`;
      }).join('')
    }</div>
  </div>`;

  const rows = paletteData.map(({ rgb, proportion }, i) => {
    const { tints, shades } = makeTintsShades(rgb);
    const allSwatches = [...tints, rgb, ...shades];
    const pct = Math.round(proportion * 100);
    const hex = rgbToHex(rgb);

    const swatchHtml = allSwatches.map((c, si) => {
      const ch = rgbToHex(c);
      const isBase = si === TINT_STEPS;
      const tc = textColour(c);
      return `<div class="swatch${isBase ? ' base' : ''}"
        style="background:${ch}"
        data-hex="${ch}"
        title="${ch}">
        <span class="swatch-tooltip" style="background:${ch};color:${tc}">${ch}</span>
      </div>`;
    }).join('');

    return `<div class="colour-block">
      <div class="colour-label">${String(i+1).padStart(2,'0')} · ${hex} · ${pct}%</div>
      <div class="swatch-row">${swatchHtml}</div>
    </div>`;
  }).join('');

  const s = extractionSettings;
  analysisArea.innerHTML = `
    <div class="analysis-layout">
      <div class="selected-image-wrap">
        <img src="${imgEl.src}" alt="" crossorigin="anonymous" />
      </div>
      <div class="palette-panel">

        <div class="settings-panel">
          <button class="settings-toggle" id="settingsToggle">
            extraction settings
            <span class="caret">&#x25BE;</span>
          </button>
          <div class="settings-body hidden" id="settingsBody">
            <div class="setting-row">
              <label>colours <span class="setting-val" id="colorCountVal">${s.colorCount}</span></label>
              <input type="range" id="sColorCount" min="4" max="12" step="1" value="${s.colorCount}">
            </div>
            <div class="setting-row">
              <label>quality</label>
              <select id="sQuality">
                <option value="hi" ${s.quality==='hi'?'selected':''}>high (slow)</option>
                <option value="med" ${s.quality==='med'?'selected':''}>medium</option>
                <option value="lo" ${s.quality==='lo'?'selected':''}>low (fast)</option>
              </select>
            </div>
            <div class="setting-row">
              <label>colour space</label>
              <select id="sColorSpace">
                <option value="oklch" ${s.colorSpace==='oklch'?'selected':''}>oklch (perceptual)</option>
                <option value="rgb" ${s.colorSpace==='rgb'?'selected':''}>rgb</option>
              </select>
            </div>
            <div class="setting-row">
              <label>min saturation <span class="setting-val" id="minSatVal">${s.minSaturation.toFixed(2)}</span></label>
              <input type="range" id="sMinSat" min="0" max="0.5" step="0.05" value="${s.minSaturation}">
            </div>
            <div class="setting-row" style="grid-column:1/-1">
              <div class="setting-toggle-row">
                <input type="checkbox" id="sIgnoreWhite" ${s.ignoreWhite?'checked':''}>
                <label for="sIgnoreWhite">ignore white / near-white pixels</label>
              </div>
            </div>
          </div>
        </div>

        ${mainPropBar}
        <div class="colour-rows">${rows}</div>
        ${semanticBarHtml}
        <div class="export-bar">
          <button class="btn-export" id="expHex">export hex</button>
          <button class="btn-export" id="expRgbHsl">export rgb + hsl</button>
          <button class="btn-export" id="expCss">export css vars</button>
          <button class="btn-export" id="expScp">export .color-palette</button>
          <button class="btn-export" id="expPng">export png</button>
        </div>
      </div>
    </div>
  `;

  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      navigator.clipboard.writeText(sw.dataset.hex).catch(() => {});
    });
  });

  // Settings toggle
  document.getElementById('settingsToggle').addEventListener('click', () => {
    const body = document.getElementById('settingsBody');
    const btn  = document.getElementById('settingsToggle');
    body.classList.toggle('hidden');
    btn.classList.toggle('open');
  });

  // Settings controls — update state, persist, re-extract from cached image
  let reExtractTimer = null;
  function reExtract(debounce = false) {
    saveSettings();
    if (debounce) {
      clearTimeout(reExtractTimer);
      reExtractTimer = setTimeout(() => runExtraction(), 400);
    } else {
      runExtraction();
    }
  }

  document.getElementById('sColorCount').addEventListener('input', e => {
    extractionSettings.colorCount = parseInt(e.target.value);
    document.getElementById('colorCountVal').textContent = extractionSettings.colorCount;
    reExtract(true);
  });
  document.getElementById('sQuality').addEventListener('change', e => {
    extractionSettings.quality = e.target.value;
    reExtract();
  });
  document.getElementById('sColorSpace').addEventListener('change', e => {
    extractionSettings.colorSpace = e.target.value;
    reExtract();
  });
  document.getElementById('sMinSat').addEventListener('input', e => {
    extractionSettings.minSaturation = parseFloat(e.target.value);
    document.getElementById('minSatVal').textContent = extractionSettings.minSaturation.toFixed(2);
    reExtract(true);
  });
  document.getElementById('sIgnoreWhite').addEventListener('change', e => {
    extractionSettings.ignoreWhite = e.target.checked;
    reExtract();
  });

  document.getElementById('expHex').addEventListener('click', () => exportHex(palette));
  document.getElementById('expRgbHsl').addEventListener('click', () => exportRgbHsl(palette));
  document.getElementById('expCss').addEventListener('click', () => exportCss(palette));
  document.getElementById('expScp').addEventListener('click', () => exportScp(palette));
  document.getElementById('expPng').addEventListener('click', () => exportPng(imgEl, palette));
}

function getDataURL(imgEl) {
  const c = document.createElement('canvas');
  c.width = imgEl.naturalWidth || imgEl.width;
  c.height = imgEl.naturalHeight || imgEl.height;
  c.getContext('2d').drawImage(imgEl, 0, 0);
  return c.toDataURL('image/png');
}

function dataURLtoBlob(dataURL) {
  const parts = dataURL.split(',');
  const mime = parts[0].match(/:(.*?);/)[1];
  const binary = atob(parts[1]);
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// ── EXPORTS ───────────────────────────────────────────────────────────────────
function downloadText(content, filename) {
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(content);
  a.download = filename;
  a.click();
}

function slugName() {
  return currentImageObj ? currentImageObj.channel : 'palette';
}

function exportHex(palette) {
  const lines = palette.map((rgb, i) => {
    const { tints, shades } = makeTintsShades(rgb);
    const all = [...tints, rgb, ...shades];
    return `/* colour ${i+1} */\n` + all.map(c => rgbToHex(c)).join('\n');
  });
  downloadText(lines.join('\n\n'), `${slugName()}-hex.txt`);
}

function exportRgbHsl(palette) {
  const lines = palette.map((rgb, i) => {
    const { tints, shades } = makeTintsShades(rgb);
    const all = [...tints, rgb, ...shades].map((c, si) => {
      const hex = rgbToHex(c);
      const [h,s,l] = rgbToHsl(c);
      const label = si < TINT_STEPS ? `tint ${TINT_STEPS - si}` : si === TINT_STEPS ? 'base' : `shade ${si - TINT_STEPS}`;
      return `  ${label.padEnd(8)} ${hex}  rgb(${c[0]}, ${c[1]}, ${c[2]})  hsl(${h}, ${s}%, ${l}%)`;
    });
    return `colour ${i+1}\n${all.join('\n')}`;
  });
  downloadText(lines.join('\n\n'), `${slugName()}-rgb-hsl.txt`);
}

function exportCss(palette) {
  const varLines = [];
  palette.forEach((rgb, i) => {
    const { tints, shades } = makeTintsShades(rgb);
    const all = [...tints, rgb, ...shades];
    all.forEach((c, si) => {
      const label = si < TINT_STEPS ? `tint-${TINT_STEPS - si}` : si === TINT_STEPS ? 'base' : `shade-${si - TINT_STEPS}`;
      const [h,s,l] = rgbToHsl(c);
      varLines.push(`  --color-${i+1}-${label}: hsl(${h}, ${s}%, ${l}%);`);
    });
  });
  const css = `:root {\n${varLines.join('\n')}\n}`;
  downloadText(css, `${slugName()}-vars.css`);
}

function exportScp(palette) {
  // Simple Color Palette format (linear sRGB, float 0–1)
  const colors = palette.map((rgb, i) => {
    const [r,g,b] = rgb.map(v => parseFloat((v/255).toFixed(4)));
    return {
      name: `Colour ${i+1} — ${rgbToHex(rgb)}`,
      components: [r, g, b]
    };
  });
  const obj = {
    name: slugName(),
    colors
  };
  downloadText(JSON.stringify(obj, null, 2), `${slugName()}.color-palette`);
}

function exportPng(imgEl, palette) {
  const SWATCH_H = 60;
  const PAD = 12;
  const imgW = Math.min(imgEl.naturalWidth || imgEl.width, 800);
  const scale = imgW / (imgEl.naturalWidth || imgEl.width);
  const imgH = Math.round((imgEl.naturalHeight || imgEl.height) * scale);

  const COLS = TINT_STEPS + 1 + SHADE_STEPS;
  const swatchW = Math.floor((imgW - PAD * (COLS + 1)) / COLS);

  const totalH = imgH + PAD + palette.length * (SWATCH_H + PAD) + PAD;

  const c = document.createElement('canvas');
  c.width = imgW + PAD * 2;
  c.height = totalH;
  const cx = c.getContext('2d');

  cx.fillStyle = '#f5f3ef';
  cx.fillRect(0, 0, c.width, c.height);

  cx.drawImage(imgEl, PAD, PAD, imgW, imgH);

  let y = imgH + PAD * 2;

  palette.forEach((rgb, i) => {
    const { tints, shades } = makeTintsShades(rgb);
    const all = [...tints, rgb, ...shades];
    all.forEach((c2, si) => {
      const x = PAD + si * (swatchW + PAD);
      cx.fillStyle = rgbToHex(c2);
      const h = si === TINT_STEPS ? SWATCH_H : SWATCH_H - 8;
      const yOff = si === TINT_STEPS ? 0 : 4;
      roundRect(cx, x, y + yOff, swatchW, h, 4);
      cx.fill();

      cx.font = '10px monospace';
      cx.fillStyle = textColour(c2);
      cx.textAlign = 'center';
      cx.fillText(rgbToHex(c2), x + swatchW/2, y + yOff + h - 8);
    });
    y += SWATCH_H + PAD;
  });

  c.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${slugName()}-palette.png`;
    a.click();
  });
}

function roundRect(cx, x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x + r, y);
  cx.lineTo(x + w - r, y);
  cx.arcTo(x + w, y, x + w, y + r, r);
  cx.lineTo(x + w, y + h - r);
  cx.arcTo(x + w, y + h, x + w - r, y + h, r);
  cx.lineTo(x + r, y + h);
  cx.arcTo(x, y + h, x, y + h - r, r);
  cx.lineTo(x, y + r);
  cx.arcTo(x, y, x + r, y, r);
  cx.closePath();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function setStatus(html, isError) {
  statusMsg.innerHTML = html;
  statusMsg.className = 'status-msg' + (isError ? ' error' : '');
}
</script>
</body>
