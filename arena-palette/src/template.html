<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Are.na Palette</title>
<!--
  arena-palette v1.22
  ──────────────────────────────────────────────────────────────────
  Are.na colour palette extractor tool
  Fetches images from up to 4 Are.na channels, extracts a 7-colour
  k-means palette from a selected image, generates tints/shades, and
  exports in multiple formats.

  Changelog:

    v1.22 (2026-04-14) — Remove all inline styles and spacer divs from template.
                         Spacing now handled in CSS: gap on .channels-section,
                         margin-top on .status-msg, #tokenHint rule in stylesheet.
                         In main.js: proportion bar wrapper gets .prop-bar class,
                         full-span setting rows get .setting-row--full class,
                         tints & shades heading gets .section-heading--flush class.
    v1.21a (2026-04-13) — Colour token correction. --bg #8e8e8e, --surface #686868,
                         --surface2 #5a5a5a. --surface-text #e8e8e8 / --surface-muted
                         #b0b0b0 for text on dark surfaces. .visually-hidden class.
    v1.21 (2026-04-13) — Accessibility and contrast pass. Dark text on mid-grey.
                         Light input field backgrounds. Min 14px font size.
                         Button hierarchy. Proper labels and aria throughout.
    v1.20 (2026-04-13) — Colour naming via api.color.pizza.
    v1.19 (2026-04-13) — Clean layout rewrite.
    v1.18 (2026-04-13) — Fixed palette panel overflow at mid widths.
    v1.17 (2026-04-13) — Three-breakpoint responsive system.
    v1.16 (2026-04-13) — Fixed responsive layout.
    v1.15 (2026-04-13) — Fixed responsive stacking.
    v1.14 (2026-04-13) — Layout restructure: thumbnails moved to sidebar.
    v1.13 (2026-04-13) — Image caption below selected image.
    v1.12 (2026-04-13) — Replaced swatch tooltip with inline hex reveal.
    v1.11 (2026-04-13) — Added "tints & shades" section heading.
    v1.10 (2026-04-13) — Mid-grey colour scheme (#808080 base).
    v1.9  (2026-04-12) — Full CSS unit pass.
    v1.8  (2026-04-12) — Typography: Karla + Courier Prime.
    v1.7  (2026-04-07) — Full-width proportion bar.
    v1.6  (2026-04-07) — Semantic palette section.
    v1.5  (2026-04-07) — Extraction settings panel. localStorage persistence.
    v1.4  (2026-04-07) — Color Thief v3.
    v1.3  (2026-04-07) — Color Thief v2 (MMCQ).
    v1.2  (2026-04-07) — Fixed v3 image URL fields. Two-step random-page fetch.
    v1.1  (2026-04-07) — Migrated to Are.na v3 API.
    v1.0  (2026-04-07) — Initial release.

  API: Are.na REST API v3 — https://www.are.na/developers/explore
  Colour naming: api.color.pizza v1 — https://github.com/meodai/color-name-api

  Dependencies:
    Color Thief 3.x (unpkg) — MMCQ palette extraction, v3 API
    JSZip 3.10.1 (cdnjs) — used in export functions
    Karla + Courier Prime (Google Fonts)
  ──────────────────────────────────────────────────────────────────
-->
<script src="https://unpkg.com/colorthief@3/dist/umd/color-thief.global.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- INJECT:CSS -->
</head>
<body>

<header>
  <h1>are.na palette</h1>
  <span aria-label="Version 1.22">v1.22</span>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" aria-label="Channels and images">

    <section class="channels-section" aria-labelledby="channels-heading">
      <h2 id="channels-heading">Channels</h2>
      <div class="channel-list" id="channelList" role="list"></div>
      <button class="btn-add" id="btnAddChannel" aria-label="Add another channel">
        + add channel
      </button>
    </section>

    <div class="token-row">
      <label for="tokenInput">Access token (optional)</label>
      <input
        type="password"
        id="tokenInput"
        name="arena-token"
        placeholder="leave blank for public channels"
        autocomplete="off"
        aria-describedby="tokenHint"
      />
      <span id="tokenHint">Only needed for private channels</span>
    </div>

    <div class="fetch-row">
      <button class="btn-fetch" id="btnFetch">fetch images</button>
      <div class="status-msg" id="statusMsg" role="status" aria-live="polite"></div>
    </div>

    <section class="sidebar-images" aria-labelledby="images-heading">
      <h2 id="images-heading">Images</h2>
      <div
        class="placeholder-grid"
        id="imageGrid"
        role="list"
        aria-label="Fetched images — click to extract palette"
      >
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
      </div>
    </section>

  </aside>

  <!-- MAIN -->
  <main class="main" aria-label="Palette analysis">
    <h2>Palette analysis</h2>
    <div id="analysisArea">
      <div class="empty-analysis" role="status">
        ← select an image to extract its palette
      </div>
    </div>
  </main>
</div>

<!-- Hidden canvas for colour extraction — display:none is functional, not presentational -->
<canvas id="scratchCanvas" style="display:none" aria-hidden="true"></canvas>

<!-- INJECT:JS -->
</body>
</html>
