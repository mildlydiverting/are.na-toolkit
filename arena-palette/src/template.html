<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Are.na Palette</title>
<!--
  arena-palette v1.23
  ──────────────────────────────────────────────────────────────────
  Changelog:

    v1.23 (2026-04-14) — Three-column layout. No top header bar. h1 branding
                         moves to sidebar top on dark bg. Channels section
                         collapsible (open by default, auto-closes when images
                         load). Image column: h2 "Select an image" transitions
                         to block title on selection. Metadata below image:
                         title, are.na link, via user, source+date, description
                         with show more toggle. Block data extended to include
                         description, source, user, created_at.
                         Responsive: ≤1100px sidebar + stacked cols; ≤600px
                         full stack.
    v1.22 (2026-04-14) — Remove all inline styles and spacer divs.
    v1.21a (2026-04-13) — Colour token correction.
    v1.21 (2026-04-13) — Accessibility and contrast pass.
    v1.20 (2026-04-13) — Colour naming via api.color.pizza.
    v1.19 (2026-04-13) — Clean layout rewrite.

  API: Are.na REST API v3 — https://www.are.na/developers/explore
  Colour naming: api.color.pizza v1 — https://github.com/meodai/color-name-api
  Dependencies: Color Thief 3.x, JSZip 3.10.1, Karla + Courier Prime
  ──────────────────────────────────────────────────────────────────
-->
<script src="https://unpkg.com/colorthief@3/dist/umd/color-thief.global.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- INJECT:CSS -->
</head>
<body>

<div class="layout">

  <!-- COLUMN 1: SIDEBAR -->
  <aside class="sidebar" aria-label="Channels and images">

    <div class="sidebar-branding">
      <h1>are.na palette</h1>
      <span class="version" aria-label="Version 1.23">v1.23</span>
    </div>

    <!-- Channels — collapsible, open by default, auto-closes on image load -->
    <section class="channels-section" aria-labelledby="channels-heading">
      <button
        class="section-toggle"
        id="channelsToggle"
        aria-expanded="true"
        aria-controls="channelsBody"
      >
        <h2 id="channels-heading">Channels</h2>
        <span class="caret" aria-hidden="true">&#x25BE;</span>
      </button>
      <div class="section-body" id="channelsBody">
        
        <div class="channel-list" id="channelList" role="list"></div>
        <button class="btn-add" id="btnAddChannel" aria-label="Add another channel">
          + add channel
        </button>
        <div class="token-row">
          <label for="tokenInput">Are.na Access token</label>
          <input
            type="password"
            id="tokenInput"
            name="arena-token"
            placeholder="leave blank for public channels"
            autocomplete="off"
            aria-describedby="tokenHint"
          />
          <span id="tokenHint">Only needed for private channels. Only needs READ access, and is stored in your browser's local storage. <a href="https://www.are.na/developers/personal-access-tokens">Get one on are.na</a></span>
        </div>
        <div class="fetch-row">
          <button class="btn-fetch" id="btnFetch">Fetch images</button>
          <div class="status-msg" id="statusMsg" role="status" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <!-- Image thumbnails -->
    <section class="sidebar-images" aria-labelledby="images-heading">
      <h2 id="images-heading">Images</h2>
      <div
        class="placeholder-grid"
        id="imageGrid"
        role="list"
        aria-label="Fetched images — click to extract palette"
      >
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
        <div class="placeholder-cell" role="listitem" aria-hidden="true"></div>
      </div>
    </section>

  </aside>

  <!-- COLUMN 2: IMAGE -->
  <section class="image-col" aria-labelledby="image-col-heading">
    <h2 class="col-heading" id="image-col-heading">Image</h2>
    <div id="imageArea">
      <div class="empty-image" role="status">← add channels to get random images</div>
    </div>
  </section>

  <!-- COLUMN 3: PALETTE -->
  <section class="palette-col" aria-labelledby="palette-col-heading">
    <h2 class="col-heading" id="palette-col-heading">Palette analysis</h2>
    <div id="analysisArea">
      <div class="empty-analysis" role="status">← select an image to extract its palette</div>
    </div>
  </section>

</div>

<!-- Hidden canvas for colour extraction — display:none is functional, not presentational -->
<canvas id="scratchCanvas" style="display:none" aria-hidden="true"></canvas>

<!-- INJECT:JS -->
</body>
</html>
